<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Cicada constellation - simplified, every vertex has a star -->
  <g stroke="#e8e0d6" stroke-linecap="round" stroke-linejoin="round">

    <!-- === NEAR WING === -->
    <line x1="280" y1="278" x2="460" y2="130" stroke-width="0.6" opacity="0.35"/>
    <line x1="460" y1="130" x2="540" y2="70" stroke-width="0.6" opacity="0.32"/>
    <line x1="540" y1="70" x2="485" y2="160" stroke-width="0.5" opacity="0.25"/>
    <line x1="485" y1="160" x2="300" y2="278" stroke-width="0.5" opacity="0.25"/>
    <!-- Vein -->
    <line x1="460" y1="130" x2="485" y2="160" stroke-width="0.35" opacity="0.12"/>

    <!-- === FAR WING === -->
    <line x1="280" y1="278" x2="345" y2="125" stroke-width="0.5" opacity="0.25"/>
    <line x1="345" y1="125" x2="377" y2="48" stroke-width="0.5" opacity="0.22"/>
    <line x1="377" y1="48" x2="325" y2="148" stroke-width="0.4" opacity="0.16"/>
    <line x1="325" y1="148" x2="275" y2="260" stroke-width="0.4" opacity="0.16"/>
    <!-- Vein -->
    <line x1="345" y1="125" x2="325" y2="148" stroke-width="0.3" opacity="0.1"/>

    <!-- === BODY === -->
    <line x1="245" y1="300" x2="280" y2="278" stroke-width="0.8" opacity="0.5"/>
    <line x1="300" y1="278" x2="345" y2="270" stroke-width="0.7" opacity="0.4"/>
    <line x1="345" y1="270" x2="385" y2="275" stroke-width="0.6" opacity="0.32"/>

    <!-- === HEAD (triangle) === -->
    <line x1="245" y1="300" x2="205" y2="298" stroke-width="0.7" opacity="0.45"/>
    <line x1="205" y1="298" x2="218" y2="272" stroke-width="0.7" opacity="0.45"/>
    <line x1="218" y1="272" x2="245" y2="300" stroke-width="0.7" opacity="0.45"/>

    <!-- === EYES === -->
    <line x1="205" y1="298" x2="185" y2="288" stroke-width="0.55" opacity="0.4"/>
    <line x1="218" y1="272" x2="222" y2="255" stroke-width="0.55" opacity="0.4"/>

    <!-- === ANTENNAE === -->
    <line x1="185" y1="288" x2="158" y2="262" stroke-width="0.45" opacity="0.3"/>
    <line x1="222" y1="255" x2="210" y2="232" stroke-width="0.45" opacity="0.3"/>

    <!-- === LEGS (minimal) === -->
    <line x1="310" y1="278" x2="322" y2="305" stroke-width="0.35" opacity="0.15"/>
    <line x1="360" y1="272" x2="370" y2="298" stroke-width="0.35" opacity="0.13"/>

    <!-- === STARS === -->

    <!-- Thorax (hub) -->
    <circle cx="280" cy="278" r="3" fill="#e8e0d6" opacity="0.75"/>
    <circle cx="280" cy="278" r="6" fill="#e8e0d6" opacity="0.06"/>

    <!-- Near wing -->
    <circle cx="540" cy="70" r="3" fill="#e8e0d6" opacity="0.9"/>
    <circle cx="540" cy="70" r="7" fill="#e8e0d6" opacity="0.05"/>
    <circle cx="460" cy="130" r="2.2" fill="#e8e0d6" opacity="0.6"/>
    <circle cx="485" cy="160" r="1.5" fill="#e8e0d6" opacity="0.38"/>
    <circle cx="300" cy="278" r="1.5" fill="#e8e0d6" opacity="0.45"/>

    <!-- Far wing -->
    <circle cx="377" cy="48" r="2.5" fill="#e8e0d6" opacity="0.65"/>
    <circle cx="377" cy="48" r="5.5" fill="#e8e0d6" opacity="0.04"/>
    <circle cx="345" cy="125" r="1.8" fill="#e8e0d6" opacity="0.42"/>
    <circle cx="325" cy="148" r="1.2" fill="#e8e0d6" opacity="0.3"/>
    <circle cx="275" cy="260" r="1.2" fill="#e8e0d6" opacity="0.3"/>

    <!-- Body -->
    <circle cx="245" cy="300" r="1.8" fill="#e8e0d6" opacity="0.5"/>
    <circle cx="345" cy="270" r="1.3" fill="#e8e0d6" opacity="0.35"/>
    <circle cx="385" cy="275" r="1.5" fill="#e8e0d6" opacity="0.35"/>

    <!-- Head -->
    <circle cx="205" cy="298" r="1.5" fill="#e8e0d6" opacity="0.48"/>
    <circle cx="218" cy="272" r="1.5" fill="#e8e0d6" opacity="0.48"/>

    <!-- Eyes -->
    <circle cx="185" cy="288" r="2.2" fill="#e8e0d6" opacity="0.7"/>
    <circle cx="185" cy="288" r="5" fill="#e8e0d6" opacity="0.04"/>
    <circle cx="222" cy="255" r="2" fill="#e8e0d6" opacity="0.6"/>

    <!-- Antenna tips -->
    <circle cx="158" cy="262" r="2" fill="#e8e0d6" opacity="0.55"/>
    <circle cx="210" cy="232" r="1.8" fill="#e8e0d6" opacity="0.48"/>

    <!-- Leg tips -->
    <circle cx="322" cy="305" r="1" fill="#e8e0d6" opacity="0.2"/>
    <circle cx="370" cy="298" r="1" fill="#e8e0d6" opacity="0.18"/>

    <!-- Ambient stars -->
    <circle cx="585" cy="28" r="0.7" fill="#e8e0d6" opacity="0.1"/>
    <circle cx="100" cy="175" r="0.5" fill="#e8e0d6" opacity="0.06"/>
    <circle cx="560" cy="240" r="0.5" fill="#e8e0d6" opacity="0.06"/>
    <circle cx="440" cy="410" r="0.4" fill="#e8e0d6" opacity="0.04"/>
  </g>
</svg>
